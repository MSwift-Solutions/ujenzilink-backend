server:
  port: 8080
  address: 0.0.0.0
  tomcat:
    threads:
      max: 40          # was 200 by default - prevents CPU thrashing on 1GB VPS
      min-spare: 5
    accept-count: 20   # queue depth before rejecting
    max-swallow-size: 50MB
    max-http-form-post-size: 50MB


logging:
  file:
    name: /var/log/ujenzilink/app.log
  logback:
    rolling-policy:
      file-name-pattern: /var/log/ujenzilink/app-%d{yyyy-'W'ww}.%i.log
      max-history: 52
      total-size-cap: 10GB
  level:
    root: INFO
    com.ujenzilink: DEBUG
    org.hibernate.SQL: WARN
    org.hibernate.type.descriptor.sql.BasicBinder: WARN

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

spring:
  output:
    ansi:
      enabled: ALWAYS
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 60MB
      file-size-threshold: 1KB   # Force disk write for large files
      location: /tmp/uploads   

  # Postgres for local
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10     # up from 5 — supports more concurrent requests
      minimum-idle: 2           # keep 2 warm connections at all times
      connection-timeout: 20000 # 20 s — fail fast rather than queue forever
      idle-timeout: 300000      # 5 min — release idle connections
      max-lifetime: 1800000     # 30 min — recycle before DB drops the connection
      keepalive-time: 60000     # 60 s — ping idle connections to keep them alive

  jpa:
    hibernate:
      ddl-auto: ${DB_DDL}
    show-sql: false
    properties:
      hibernate:
        format_sql: true
    database: postgresql
    database-platform: org.hibernate.dialect.PostgreSQLDialect

  # Mail
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

jwt:
  secret-key: ${JWT_SECRET}
  expiration-hours: ${JWT_EXPIRATION:24}

google:
  oauth:
    client-id: ${GOOGLE_CLIENT_ID}

cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME}
  api-key: ${CLOUDINARY_API_KEY}
  api-secret: ${CLOUDINARY_API_SECRET}
  root-folder: ujenzilink

resend:
  api-key: ${RESEND_API_KEY}
  from-email: noreply@mail.ujenzilink.com

r2:
  account-id: ${R2_ACCOUNT_ID}
  access-key: ${R2_ACCESS_KEY}
  secret-key: ${R2_SECRET_KEY}
  bucket-name: ${R2_BUCKET_NAME}
  public-url: ${R2_PUBLIC_URL}
  endpoint: ${ENDPOINT}

folders:
  profile-pictures: profile-pictures
  post-images: posts
  project-stage-images: project-stages
  project-floor-plans: floor-plans

app:
  frontend-url: https://ujenzilink.com
  admin-api-key: musa
  report-recipient: ujenzilink@gmail.com
  upload:
    max-file-size: 52428800          # 50 MB in bytes
    image-accept-types: jpg,jpeg,png,webp
    plan-accept-types: pdf,jpg,jpeg,png,dwg
    max-post-photos: 4
    max-stage-photos: 4
    local-mirror-base: /var/uploads  # local copy mirrors R2 key structure — never deleted